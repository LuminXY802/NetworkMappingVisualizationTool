<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Godzilla Network Mapper</title>
    <link rel="stylesheet" href="{{ url_for('style', filename='style.css') }}">
</head>

<body>

<header class="topbar">
    <h1>Godzilla Network Mapper</h1>
    <button id="themeToggle">Toggle Theme</button>
</header>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h2>Controls</h2>

        <label>Target</label>
        <input id="target" placeholder="192.168.1.0/24">

        <label>Profile</label>
        <select id="profile">
            <option value="quick">Quick</option>
            <option value="lan">LAN Discovery</option>
            <option value="full">Full Scan</option>
        </select>

        <button id="startBtn">Start Scan</button>

        <h3>Status</h3>
        <div id="statusBox">Idle</div>

    </div>

    <!-- GRAPH -->
    <div class="graph">
        <div id="graphContainer">
            Graph will render here
        </div>
    </div>

    <!-- INSPECTOR -->
    <div class="inspector">
        <h2>Node Inspector</h2>
        <pre id="nodeData">Click a node</pre>
    </div>

</div>

<!-- LOGS -->
<div class="logs">
    <h3>Logs</h3>
    <div id="logBox"></div>
</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
